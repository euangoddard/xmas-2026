<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#0b1026" />
    <link rel="stylesheet" href="/src/style.css" />
    <title>A Christmas Card from Oxford</title>
    <meta
      name="description"
      content="An interactive snow globe of Oxford — season's greetings."
    />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://xmas-26.euans.space/" />
    <meta property="og:title" content="A Christmas Card from Oxford" />
    <meta
      property="og:description"
      content="An interactive snow globe of Oxford — season's greetings."
    />
    <meta property="og:image" content="https://xmas-26.euans.space/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="An interactive snow globe of Oxford at Christmas" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="A Christmas Card from Oxford" />
    <meta
      name="twitter:description"
      content="An interactive snow globe of Oxford — season's greetings."
    />
    <meta name="twitter:image" content="https://xmas-26.euans.space/og-image.png" />
    <meta name="twitter:image:alt" content="An interactive snow globe of Oxford at Christmas" />
  </head>
  <body>
    <div id="app">
      <canvas id="scene"></canvas>

      <div id="loading" class="overlay">
        <div class="loading-inner">
          <div class="snowflake">❄</div>
          <p>Warming up the snow globe…</p>
        </div>
      </div>

      <header id="title" class="hud hud--top" hidden>
        <h1>Season's Greetings from Oxford</h1>
      </header>

      <div id="controls" class="hud hud--bottom" hidden>
        <button id="shake" class="btn" type="button" title="Shake the snow">
          <span class="btn__icon">❄</span><span class="btn__label">Shake</span>
        </button>
        <button id="view" class="btn" type="button" title="Toggle view">
          <span class="btn__icon">⤢</span
          ><span class="btn__label">Zoom out</span>
        </button>
        <button
          id="sound"
          class="btn"
          type="button"
          title="Toggle sound"
          aria-pressed="false"
        >
          <span class="btn__icon">🔈</span
          ><span class="btn__label">Sound on</span>
        </button>
      </div>

      <p id="hint" class="hud hud--hint" hidden>
        Drag to spin · scroll or pinch to zoom
      </p>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
