<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="g">
      <circle cx="32" cy="27" r="23"/>
    </clipPath>
    <radialGradient id="glass" cx="42%" cy="36%" r="60%">
      <stop offset="0%" stop-color="#1b2a52"/>
      <stop offset="100%" stop-color="#0b1026"/>
    </radialGradient>
    <radialGradient id="base" cx="50%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#3a1a08"/>
      <stop offset="100%" stop-color="#1e0c04"/>
    </radialGradient>
  </defs>

  <!-- Base -->
  <rect x="11" y="50" width="42" height="10" rx="4" fill="url(#base)"/>

  <!-- Gold rim band -->
  <rect x="9" y="47" width="46" height="6" rx="2" fill="#b8893a"/>
  <rect x="10" y="48" width="44" height="4" rx="1.5" fill="#d4a84c"/>

  <!-- Globe sky fill -->
  <circle cx="32" cy="27" r="23" fill="url(#glass)"/>

  <!-- Stars (before buildings) -->
  <g clip-path="url(#g)" fill="white">
    <circle cx="18" cy="13" r="0.7" opacity="0.85"/>
    <circle cx="44" cy="11" r="0.6" opacity="0.75"/>
    <circle cx="50" cy="20" r="0.7" opacity="0.8"/>
    <circle cx="13" cy="24" r="0.5" opacity="0.7"/>
    <circle cx="48" cy="30" r="0.6" opacity="0.7"/>
  </g>

  <!-- Buildings (clipped to globe) -->
  <g clip-path="url(#g)">
    <!-- Ground / snow floor -->
    <ellipse cx="32" cy="48" rx="23" ry="6" fill="#d4e8f4"/>

    <!-- Left tower -->
    <rect x="11" y="28" width="6" height="20" rx="0.5" fill="#6b7d91"/>
    <!-- Left tower battlements -->
    <rect x="10" y="25" width="2.5" height="4" fill="#6b7d91"/>
    <rect x="13.5" y="25" width="2.5" height="4" fill="#6b7d91"/>

    <!-- Right tower (slightly shorter) -->
    <rect x="47" y="31" width="6" height="17" rx="0.5" fill="#6b7d91"/>
    <rect x="46" y="28" width="2.5" height="4" fill="#6b7d91"/>
    <rect x="49.5" y="28" width="2.5" height="4" fill="#6b7d91"/>

    <!-- Radcliffe Camera — cylindrical drum -->
    <rect x="22" y="36" width="20" height="12" rx="1" fill="#8596a8"/>
    <!-- Dome (ellipse arc on top of drum) -->
    <ellipse cx="32" cy="36" rx="10" ry="5.5" fill="#9aaabb"/>
    <!-- Lantern finial -->
    <rect x="31" y="29" width="2" height="7" rx="1" fill="#9aaabb"/>
    <circle cx="32" cy="29" r="1.5" fill="#aabccc"/>

    <!-- Warm lamp glow at base of Radcliffe Camera -->
    <ellipse cx="32" cy="49" rx="5" ry="1.5" fill="#f0d080" opacity="0.4"/>

    <!-- Christmas tree (right of dome) -->
    <polygon points="41,47 44,38 47,47" fill="#2d6e3a"/>
    <polygon points="41.5,41 44,34 46.5,41" fill="#3a8a4a"/>
    <!-- Baubles -->
    <circle cx="42.5" cy="44" r="1" fill="#e04040" opacity="0.9"/>
    <circle cx="45.5" cy="42" r="0.8" fill="#f0c020" opacity="0.9"/>

    <!-- Snow particles -->
    <g fill="white" opacity="0.9">
      <circle cx="26" cy="18" r="0.8"/>
      <circle cx="38" cy="21" r="0.7"/>
      <circle cx="20" cy="31" r="0.8"/>
      <circle cx="43" cy="26" r="0.7"/>
      <circle cx="31" cy="14" r="0.6"/>
      <circle cx="16" cy="20" r="0.6"/>
      <circle cx="47" cy="16" r="0.7"/>
    </g>
  </g>

  <!-- Globe glass outline + highlight -->
  <circle cx="32" cy="27" r="23" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.2"/>
  <!-- Specular highlight arc -->
  <path d="M 17 17 Q 25 8 40 14" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.8" stroke-linecap="round"/>
</svg>
